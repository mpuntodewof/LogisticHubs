name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StockLedger.sln

      - name: Build
        run: dotnet build StockLedger.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test Tests/StockLedger.Unit.Tests/StockLedger.Unit.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=unit-test-results.trx"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/TestResults/*.trx'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: stockledger
          MYSQL_USER: stockledger_user
          MYSQL_PASSWORD: changeme
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5164
      ConnectionStrings__DefaultConnection: "server=127.0.0.1;port=3306;database=stockledger;user=stockledger_user;password=changeme;AllowUserVariables=true;Connect Timeout=30;SslMode=None"
      JwtSettings__SecretKey: "ci-e2e-jwt-secret-that-is-long-enough-for-hs256-signing"
      JwtSettings__Issuer: stockledger-api
      JwtSettings__Audience: stockledger-client
      CorsSettings__AllowedOrigins__0: http://localhost:5298

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore StockLedger.sln

      - name: Build solution
        run: dotnet build StockLedger.sln --configuration Release --no-restore

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpassword --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Start API in background
        run: |
          nohup dotnet run --project API/API.csproj --configuration Release --no-build --no-launch-profile > api.log 2>&1 &
          echo $! > api.pid
          echo "API PID: $(cat api.pid)"

      - name: Wait for API ready
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:5164/health/ready > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          echo "API did not become ready in time. Last 100 log lines:"
          tail -100 api.log
          exit 1

      - name: Run E2E tests
        run: dotnet test Tests/StockLedger.E2E.Tests/StockLedger.E2E.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=e2e-test-results.trx"

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) || true
          fi

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api-logs
          path: api.log

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/TestResults/*.trx'

  ef-migration-bundle:
    name: EF Migration Bundle
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: Restore
        run: dotnet restore StockLedger.sln

      - name: Generate migration bundle
        run: |
          dotnet ef migrations bundle \
            --project Infrastructure/Infrastructure.csproj \
            --startup-project API/API.csproj \
            --configuration Release \
            --self-contained \
            -r linux-x64 \
            --output ./efbundle

      - name: Upload migration bundle
        uses: actions/upload-artifact@v4
        with:
          name: ef-migration-bundle-${{ github.sha }}
          path: efbundle
          retention-days: 30

  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [e2e-tests, ef-migration-bundle]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image
        if: github.event_name == 'push'
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          docker run -d --name smoke-api \
            -e ConnectionStrings__DefaultConnection="server=localhost;database=test" \
            -e JwtSettings__SecretKey="smoke-test-key-that-is-long-enough-for-hs256" \
            -e CorsSettings__AllowedOrigins__0="http://localhost" \
            -p 8080:8080 \
            "$IMAGE_TAG" || true
          sleep 5
          docker logs smoke-api 2>&1 | head -30
          docker stop smoke-api || true
          docker rm smoke-api || true
